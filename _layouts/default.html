<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>{{ page.title }} — SneakerNet</title>
<style>
  *, *::before, *::after { box-sizing: border-box; }
  body {
    font-family: system-ui, -apple-system, sans-serif;
    max-width: 860px;
    margin: 0 auto;
    padding: 2rem 1.25rem 4rem;
    background: #0d1117;
    color: #e6edf3;
    line-height: 1.7;
  }
  .nav {
    margin-bottom: 2.5rem;
    font-size: .9rem;
  }
  .nav a { color: #58a6ff; text-decoration: none; }
  .nav a:hover { text-decoration: underline; }
  h1, h2, h3, h4 { color: #79c0ff; margin-top: 2rem; line-height: 1.3; }
  h1 { font-size: 2rem; margin-top: 0; }
  h2 { font-size: 1.4rem; border-bottom: 1px solid #21262d; padding-bottom: .4rem; }
  a { color: #58a6ff; }
  code {
    background: #161b22;
    padding: .15em .4em;
    border-radius: 4px;
    font-size: .88em;
    font-family: ui-monospace, monospace;
  }
  pre {
    background: #161b22;
    border: 1px solid #21262d;
    border-radius: 6px;
    padding: 1rem 1.25rem;
    overflow-x: auto;
    font-size: .88em;
  }
  pre code { background: none; padding: 0; font-size: inherit; }
  table { border-collapse: collapse; width: 100%; margin: 1.25rem 0; font-size: .92rem; }
  th, td { border: 1px solid #30363d; padding: .5rem .8rem; text-align: left; vertical-align: top; }
  th { background: #161b22; color: #79c0ff; font-weight: 600; }
  tr:nth-child(even) td { background: #0d1117; }
  blockquote {
    border-left: 3px solid #30363d;
    margin: 1rem 0;
    padding: .5rem 1rem;
    color: #8b949e;
  }
  hr { border: none; border-top: 1px solid #21262d; margin: 2rem 0; }
  ul, ol { padding-left: 1.5rem; }
  li { margin: .3rem 0; }
</style>
</head>
<body>
<nav class="nav">
  <a href="/">← sneakernet.live</a>
</nav>
{{ content }}
</body>
</html>
